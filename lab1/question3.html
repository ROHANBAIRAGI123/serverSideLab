<!-- Formatting tags -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatting Tags</title>
 </head>
 <body>
    <table align="center" cellpadding="6" border="1">
    <tr><th>HTML Tag</th><th>Output</th></tr>
    <tr><td>normal text</td><td>hello world</td></tr>
    <tr><td>Font and its attribute</td><td style="color: blue;">Font Color Blue</td></tr>
    <tr><td>&lt;B&gt;</td><td><b>Bold</b></td></tr>
    <tr><td>&lt;I&gt;</td><td><i>Italic</i></td></tr>
    <tr><td>&lt;U&gt;</td><td><u>Underline</u></td></tr>
    <tr><td>&lt;EM&gt;</td><td><em>Emphasis</em></td></tr>
    <tr><td>&lt;STRONG&gt;</td><td><strong>Emphasis</strong></td></tr>
    <tr><td>&lt;TELETYPE&gt;</td><td><tt>TELETYPE</tt></td></tr>
    <tr><td>&lt;SUB&gt;</td><td>a<sub>b</sub></td></tr>
    <tr><td>&lt;SUP&gt;</td><td>b<sup>a</sup></td></tr>
</table>
 </body>
 </html>
