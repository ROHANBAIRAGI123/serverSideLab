<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Registration Form</title>
  </head>
  <body>
    <div align="center">
      <h3>Employee Registration Form</h3>
      <form>
        <table>
          <tr>
            <td></td>
            <td>
              <input type="radio" name="sal" checked /> Mr.
              <input type="radio" name="sal" /> Mrs.
              <input type="radio" name="sal" /> Ms.
            </td>
          </tr>
          <tr>
            <td>First Name</td>
            <td><input type="text" placeholder="First Name" size="30" /></td>
          </tr>
          <tr>
            <td>Last Name</td>
            <td><input type="text" placeholder="Last Name" size="30" /></td>
          </tr>
          <tr>
            <td>Mail Address1</td>
            <td><input type="text" size="40" /></td>
          </tr>
          <tr>
            <td>Mail Address2</td>
            <td><input type="text" size="40" /></td>
          </tr>
          <tr>
            <td>City</td>
            <td><input type="text" size="40" /></td>
          </tr>
          <tr>
            <td>State</td>
            <td>
              <select>
                <option>Gujarat</option>
                <option>Maharashtra</option>
                <option>Rajasthan</option>
                <option>Madhya Pradesh</option>
              </select>
            </td>
          </tr>
          <tr>
            <td>Zip</td>
            <td><input type="text" size="30" /></td>
          </tr>
          <tr>
            <td>Upload Photo</td>
            <td><input type="file" /></td>
          </tr>
          <tr>
            <td>E-Mail</td>
            <td><input type="email" size="45" /></td>
          </tr>
          <tr>
            <td>Mobile</td>
            <td><input type="tel" placeholder="+91" size="30" /></td>
          </tr>
          <tr>
            <td>Languages known</td>
            <td>
              <input type="checkbox" checked /> Gujarati<br />
              <input type="checkbox" checked /> Hindi<br />
              <input type="checkbox" checked /> English<br />
              <input type="checkbox" /> Marathi
            </td>
          </tr>
          <tr>
            <td>Additional Information</td>
            <td><textarea rows="4" cols="40" placeholder="Optional"></textarea></td>
          </tr>
          <tr>
            <td></td>
            <td>
              <input type="submit" value="submit" />
              <input type="reset" value="reset" />
            </td>
          </tr>
        </table>
      </form>
    </div>
  </body>
</html>
